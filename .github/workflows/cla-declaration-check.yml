name: CLA Declaration Check

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  cla-declaration:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate contributor declaration
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const hasDeclarationPhrase =
              /declare that i have read and agree to the contribution assignment terms/i.test(body);
            const hasPlaceholders = /<full legal name>|<email>/i.test(body);
            const hasNameAndEmail =
              /i,\s*[^,\n]+,\s*submitting from\s*[^,\n]+,\s*declare that i have read and agree to the contribution assignment terms/i.test(body);

            if (!hasDeclarationPhrase || hasPlaceholders || !hasNameAndEmail) {
              core.setFailed(
                "PR body must include a completed Contributor Declaration with legal name and email, as defined in .github/PULL_REQUEST_TEMPLATE.md."
              );
            }
