name: Bug report
description: Report a reproducible bug in Aegiro.
title: "fix(scope): "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short, clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps so someone else can reproduce it.
      placeholder: |
        1. Run command / open screen ...
        2. Click / input ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include versions and platform details.
      placeholder: |
        - macOS:
        - Aegiro commit/version:
        - Command(s) used:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and output
      description: Paste relevant logs/stack traces/CLI output.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the latest `main`.
          required: false
